<!DOCTYPE html>
<html ng-app="techShopApp">

<head>

<title>TechShop</title>

<script
src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js">
</script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body ng-controller="shopController">

<div class="container mt-5">

<h1 class="text-center text-primary">
TechShop
</h1>

<table class="table table-bordered table-striped">

<tr class="table-dark">     
<th>Product Name</th>
<th>Price</th>
<th>Category</th>
</tr>

<tr ng-repeat="p in products">

<td>{{p.name}}</td>
<td>{{p.price}}</td>
<td>{{p.category}}</td>

</tr>

</table>

</div>

<script>

var app =
angular.module("techShopApp", []);

app.controller("shopController",
function($scope){

$scope.products = [

{
name:"Laptop",
price:50000,
category:"Electronics"
},

{
name:"Mobile",
price:20000,
category:"Electronics"
},

{
name:"Headphones",
price:3000,
category:"Accessories"
}

];

});

</script>

</body>
</html>
