<!DOCTYPE html>
<html>
<head>
<title>College Management</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand">College Management System</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Students</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Staff</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Courses</a>
</li>

</ul>
</div>

</div>
</nav>

<!-- Header -->
<div class="container text-center mt-4">
<h1 class="text-primary">College Management System</h1>
<p class="lead">Manage Students and Staff</p>
</div>

<!-- Cards -->
<div class="container mt-4">
<div class="row g-4 text-center">

<div class="col-lg-4 col-md-6">
<div class="card shadow p-3">
<h3>Students</h3>
<p>Manage student details</p>
<button class="btn btn-primary">View</button>
</div>
</div>

<div class="col-lg-4 col-md-6">
<div class="card shadow p-3">
<h3>Staff</h3>
<p>Manage staff details</p>
<button class="btn btn-primary">View</button>
</div>
</div>

<div class="col-lg-4 col-md-6">
<div class="card shadow p-3">
<h3>Courses</h3>
<p>Manage courses</p>
<button class="btn btn-primary">View</button>
</div>
</div>

</div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-auto mt-4">
© 2026 College Management
</footer>

</body>
</html>
