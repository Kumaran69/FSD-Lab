<!DOCTYPE html>
<html ng-app="app">

<head>
<title>Shopping Cart</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="ctrl">

<h2>Shopping Cart</h2>

<h3>Products</h3>

<div ng-repeat="p in products">
{{p.name}} - {{p.price}}
<button ng-click="add(p)">Add</button>
</div>

<h3>Cart</h3>

<ul>
<li ng-repeat="c in cart">
{{c.name}} - {{c.price}}
<button ng-click="remove($index)">Delete</button>
</li>
</ul>

<h3>Total : {{total}}</h3>

<script>

var app = angular.module("app",[]);

app.controller("ctrl",function($scope){

$scope.products = [
{name:"Mobile",price:10000},
{name:"Laptop",price:40000},
{name:"Headphone",price:2000}
];

$scope.cart = [];
$scope.total = 0;

$scope.add = function(p){
$scope.cart.push(p);
$scope.total += p.price;
}

$scope.remove = function(i){
$scope.total -= $scope.cart[i].price;
$scope.cart.splice(i,1);
}

});

</script>

</body>
</html>
