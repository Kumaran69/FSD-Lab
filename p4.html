<!DOCTYPE html>
<html ng-app="myApp">
<head>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <style>
    .error { color: red; }
    .success { color: green; }
  </style>
</head>

<body ng-controller="formCtrl">

<form name="userForm" ng-submit="submitForm()" novalidate>

  <!-- Name -->
  <label>Name:</label>
  <input type="text" name="name"
         ng-model="user.name"
         required ng-minlength="3">
  <span class="error"
        ng-show="userForm.name.$touched && userForm.name.$invalid">
    Name is required (min 3 characters)
  </span>
  <br><br>

  <!-- Email -->
  <label>Email:</label>
  <input type="email" name="email"
         ng-model="user.email"
         required>
  <span class="error"
        ng-show="userForm.email.$touched && userForm.email.$invalid">
    Enter a valid email
  </span>
  <br><br>

  <!-- Password -->
  <label>Password:</label>
  <input type="password" name="password"
         ng-model="user.password"
         required ng-minlength="6">
  <span class="error"
        ng-show="userForm.password.$touched && userForm.password.$invalid">
    Password must be at least 6 characters
  </span>
  <br><br>

  <!-- Submit -->
  <button type="submit"
          ng-disabled="userForm.$invalid">
    Submit
  </button>

</form>

<p class="success" ng-show="submitted">
  ✅ Form submitted successfully
</p>

<script>
  var app = angular.module("myApp", []);
  app.controller("formCtrl", function($scope) {
    $scope.user = {};
    $scope.submitted = false;

    $scope.submitForm = function () {
      if ($scope.userForm.$valid) {
        $scope.submitted = true;
      }
    };
  });
</script>

</body>
</html>
